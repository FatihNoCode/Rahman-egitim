name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Before the build, not after: `vite build` strips types without checking
      # them, so it will happily produce a green build out of code that throws
      # on the device. This is the only thing standing between a type error and
      # production.
      - run: npm run typecheck
      - run: npm run build
      # SPA fallback: the app parses window.location.pathname manually
      # (e.g. /invite/:token, /inschrijving), so deep links need to be
      # served the same index.html rather than a hard 404 from Pages.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
