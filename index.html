
  <!DOCTYPE html>

      <meta name="robots" content="noindex, nofollow" />
      <!-- GitHub Pages serves static files and cannot set response headers, so
           the policy has to ride along in a meta tag. Note the limits of that:
           frame-ancestors and X-Frame-Options are ignored when delivered this
           way, so this does not stop clickjacking — that needs a host that can
           send real headers (e.g. putting Cloudflare in front).
           'unsafe-inline' on style-src is required by Tailwind/Radix inline
           styles; script-src deliberately does not have it. -->
      <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://uriirwsjpzsjnaosqlph.supabase.co https://*.supabase.co; frame-src 'self' https://accounts.google.com; base-uri 'self'; form-action 'self'; object-src 'none'" />
      <meta name="referrer" content="strict-origin-when-cross-origin" />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
