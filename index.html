
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <!-- viewport-fit=cover is what makes env(safe-area-inset-*) resolve to
           real values on iOS. Without it iOS reports every inset as 0, so the
           bottom tab bar sits under the home indicator and content runs into
           the notch. Android/Capacitor is unaffected either way.
           user-scalable=no stops the double-tap/pinch zoom that otherwise
           makes the native shell feel like a web page. -->
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
      <title>Rahman Eğitim</title>
      <meta name="description" content="Leerlingsysteem Rahman Camii Amersfoort" />
      <meta name="robots" content="noindex, nofollow" />
      <!-- GitHub Pages serves static files and cannot set response headers, so
           the policy has to ride along in a meta tag. Note the limits of that:
           frame-ancestors and X-Frame-Options are ignored when delivered this
           way, so this does not stop clickjacking — that needs a host that can
           send real headers (e.g. putting Cloudflare in front).
           'unsafe-inline' on style-src is required by Tailwind/Radix inline
           styles; script-src deliberately does not have it.
           img-src must list the OpenStreetMap tile hosts — the superadmin
           locations map (LocationsMap.tsx) loads tiles as <img> from
           {s}.tile.openstreetmap.org, and without them the map renders as pins
           on a blank pane.
           frame-src must list demo.arcade.software — the ProductTour onboarding
           walkthrough embeds it in an iframe. -->
      <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://tile.openstreetmap.org; connect-src 'self' https://uriirwsjpzsjnaosqlph.supabase.co https://*.supabase.co https://api.alquran.cloud; frame-src 'self' https://accounts.google.com https://demo.arcade.software; base-uri 'self'; form-action 'self'; object-src 'none'" />
      <meta name="referrer" content="strict-origin-when-cross-origin" />
      <!-- A white-background PNG, separate from the transparent logo used
           on-page — a transparent tab icon is hard to see against a dark or
           colored browser chrome. Regenerate via `node scripts/make-favicon.mjs`
           if the logo changes.
           Declared here rather than injected from an effect in App.tsx: as
           markup the browser starts fetching it while the module graph is still
           downloading, instead of only after React has mounted. -->
      <link rel="icon" href="/src/imports/favicon.png" />
      <!-- The logo is the first thing painted on both the web spinner and the
           app's greeting splash, so it is on the critical path by definition.
           Preloading lets it arrive alongside the JS rather than being
           discovered once the first component renders. -->
      <link rel="preload" as="image" href="/src/imports/logo.svg" />
      <!-- The Arabic faces used by ElifBaPage are self-hosted and bundled;
           see src/styles/fonts.css. Nothing here loads from a font CDN, so
           style-src/font-src above no longer allow one. -->
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
